# @package _global_
module:
  _target_: emg2qwerty.lightning.TransformerCTCModule
  in_features: ${module_in_features}
  electrode_channels: ${electrode_channels}
  l1_lambda: ${channel_l1_lambda}
  mlp_features: [384]  # num_features = NUM_BANDS * mlp_features[-1] = 768
  nhead: 8
  num_transformer_layers: 6
  dim_feedforward: 2048
  dropout: 0.1

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context

# @package _global_
module:
  _target_: emg2qwerty.lightning.ViTransformerCTCModule
  in_features: ${module_in_features}
  electrode_channels: ${electrode_channels}
  d_model: 256
  patch_size: [4, 11]  # (electrode_h, freq_w) patches
  spatial_nhead: 8
  spatial_layers: 2
  temporal_nhead: 8
  temporal_layers: 4
  dim_feedforward: 1024
  dropout: 0.1
  use_cls_token: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
